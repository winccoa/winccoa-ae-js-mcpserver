name: Claude Code Bot

on:
  # Trigger when someone comments @claude on an issue or PR
  issue_comment:
    types: [created]
  # Also trigger when the 'claude-code' label is added
  issues:
    types: [labeled]

jobs:
  claude-from-comment:
    # Runs when someone mentions @claude in a comment
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  claude-from-label:
    # Runs when the 'claude-code' label is added
    if: >
      github.event_name == 'issues' &&
      github.event.label.name == 'claude-code'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Solve the issue: #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}
            Description: ${{ github.event.issue.body }}

            Create a new branch, implement the fix, and open a Pull Request.
