name: Claude Code Bot

on:
  # Trigger when someone comments @claude on an issue or PR
  issue_comment:
    types: [created]

jobs:
  claude-from-comment:
    # Runs when someone mentions @claude in a comment
    if: >
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "claude/"
          show_full_output: true
          additional_permissions: |
            Bash: ["npm install:*", "npm test:*", "npm run:*", "npx:*", "node:*"]

      - name: Run Tests After Bot Changes
        if: success()
        working-directory: mcpWinCCOA
        run: |
          npm install --ignore-scripts
          npm test
